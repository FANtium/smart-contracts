# Full reference https://github.com/foundry-rs/foundry/tree/master/crates/config

[profile.default]
ast = true
auto_detect_solc = false
build_info = true
solc = "0.8.34"
bytecode_hash = "none"
evm_version = "paris"
extra_output = ["storageLayout"]
extra_output_files = ["metadata"]
fs_permissions = [
    { access = "read", path = "./test/fixtures" },
    { access = "read", path = "./out" },
]
ffi = true
fuzz = { runs = 256 }
gas_reports = ["*"]
libs = ["node_modules", "lib"]
optimizer = true
optimizer_runs = 200
out = "out"
script = "script"
src = "src"
test = "test"
via_ir = true

[profile.coverage]
fuzz = { runs = 256 }
verbosity = 3

[profile.ci]
fuzz = { runs = 1_000 }
verbosity = 3

# Profile used to rebuild storage-layout reference artifacts for OZ upgrade validation.
# Archives live outside `src/` so default builds skip them entirely; invoke with
# `FOUNDRY_PROFILE=archive forge build` (or `bun run build:archive`) to regenerate
# `out-archive/build-info/`. Redirect test/script too so Foundry doesn't re-scan
# the live test suite (which would pull current src/ back in and defeat the point).
[profile.archive]
src = "archive"
out = "out-archive"
test = "archive"
script = "archive"
solc = "0.8.28"

[fmt]
bracket_spacing = true
hex_underscores = "remove"
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
override_spacing = true
quote_style = "double"
single_line_statement_blocks = "multi"
sort_imports = true
tab_width = 4
wrap_comments = true

[rpc_endpoints]
polygon = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"
amoy = "https://polygon-amoy.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[etherscan]
polygon = { key = "${ETHERSCAN_API_KEY}" }
amoy = { key = "${ETHERSCAN_API_KEY}", url = "https://api-amoy.polygonscan.com/api" }
